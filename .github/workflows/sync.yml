name: Sync

on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify token
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ Token missing"
            exit 1
          fi
          echo "✅ Token loaded"

      - name: Sync repo
        env:
          DEST_REPO: "devadarshdev22-lgtm/rdp6t7"
          TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git remote remove destination 2>/dev/null || true

          git remote add destination "https://x-access-token:${TOKEN}@github.com/${DEST_REPO}.git"

          git push destination main --force
