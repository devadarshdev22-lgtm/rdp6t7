name: Sync

on:
  push:
    branches:
      - main

jobs:
  repo-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify token exists
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "❌ REPO_TOKEN is missing or empty"
            exit 1
          fi
          echo "✅ Token loaded successfully"

      - name: Configure git and push
        env:
          DEST_REPO: "devadarshdev22-lgtm/rdp6t7"
          TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          set -e

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Force clean remote
          git remote remove destination 2>/dev/null || true

          # IMPORTANT: correct auth format
          git remote add destination "https://x-access-token:${TOKEN}@github.com/${DEST_REPO}.git"

          echo "🚀 Pushing to destination..."
          git push destination main --force
